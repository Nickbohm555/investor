services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: investor
      POSTGRES_USER: investor
      POSTGRES_PASSWORD: investor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investor -d investor"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    command: /app/ops/docker/start-app-runtime.sh
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
