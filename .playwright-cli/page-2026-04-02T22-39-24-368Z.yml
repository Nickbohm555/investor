                            - textbox "Post text" [ref=e99]:
                              - generic [ref=e100]:
                                - generic [ref=e1948]: This month I built agent-search, which is basically my attempt at making a more serious graph-based RAG workflow instead of a single retrieve-then-answer pass.
                                - generic [ref=e1953]: "The core idea is:"
                                - generic [ref=e1958]: 1. take one large question
                                - generic [ref=e1961]: 2. decompose it into subquestions
                                - generic [ref=e1964]: 3. run those subquestions in parallel inside their own workflow branches
                                - generic [ref=e1967]: 4. optionally pause for human review before continuing
                                - generic [ref=e1970]: 5. do semantic search for each branch
                                - generic [ref=e1973]: 6. rerank the retrieved docs so the model is looking at the most relevant evidence
                                - generic [ref=e1976]: 7. answer each branch separately
                                - generic [ref=e1979]: 8. synthesize everything back into one final grounded answer
                                - generic [ref=e1984]: What I liked about building it is that it forced me to think in terms of information flow instead of just call the model harder.
                                - generic [ref=e1989]: "A lot of the value is not in the final synthesis node. It is in the structure before that:"
                                - generic [ref=e1992]: "- decomposition"
                                - generic [ref=e1995]: "- per-branch retrieval"
                                - generic [ref=e1998]: "- per-branch query expansion"
                                - generic [ref=e2001]: "- reranking after similarity search"
                                - generic [ref=e2004]: "- explicit synthesis at the end"
                                - generic [ref=e2009]: I also added a HITL checkpoint because if you’re going to decompose a question, there are real cases where you want to inspect the subquestions before the expensive work starts. Sometimes the decomposition is exactly right. Sometimes it drifts. Having that review point matters.
                                - generic [ref=e2014]: This was partly inspired by Onyx’s open post on agentic search / search architecture, but the broader reason it interested me is that this pattern keeps showing up everywhere right now.
                                - generic [ref=e2019]: "You can see versions of the same idea across the industry:"
                                - generic [ref=e2022]: "- break a big request into smaller questions"
                                - generic [ref=e2025]: "- run those questions against tools / knowledge systems"
                                - generic [ref=e2028]: "- consolidate the results into one answer"
                                - generic [ref=e2033]: That pattern is clearly real.
                                - generic [ref=e2038]: At the same time, building this made me more skeptical of the hype around parallel sub-agents as a universal answer. The upside is speed and breadth. The downside is context continuity. Once you split work across branches, each branch loses some global context. That tradeoff is not academic, it shows up immediately in design.
                                - generic [ref=e2043]: So for me this project was less I built an agent framework and more I built a concrete system that lets me test where decomposition + parallelism actually help, and where they start to hurt.
                                - generic [ref=e2048]: "PyPI:"
                                - generic [ref=e2052]: https://pypi.org/project/agent-search-sdk/
