                        - generic [ref=e215]:
                          - generic [ref=e217]: "This month I built agent-search, which is basically my attempt at making a more serious graph-based RAG workflow instead of a single retrieve-then-answer pass. The core idea is: 1. take one large question 2. decompose it into subquestions 3. run those subquestions in parallel inside their own workflow branches 4. optionally pause for human review before continuing 5. do semantic search for each branch 6. rerank the retrieved docs so the model is looking at the most relevant evidence 7. answer each branch separately 8. synthesize everything back into one final grounded answer What I liked about building it is that it forced me to think in terms of information flow instead of just call the model harder. A lot of the value is not in the final synthesis node. It is in the structure before that: - decomposition - per-branch retrieval - per-branch query expansion - reranking after similarity search - explicit synthesis at the end I also added a HITL checkpoint because if you’re going to decompose a question, there are real cases where you want to inspect the subquestions before the expensive work starts. Sometimes the decomposition is exactly right. Sometimes it drifts. Having that review point matters. This was partly inspired by Onyx’s open post on agentic search / search architecture, but the broader reason it interested me is that this pattern keeps showing up everywhere right now. You can see versions of the same idea across the industry: - break a big request into smaller questions - run those questions against tools / knowledge systems - consolidate the results into one answer That pattern is clearly real. At the same time, building this made me more skeptical of the hype around parallel sub-agents as a universal answer. The upside is speed and breadth. The downside is context continuity. Once you split work across branches, each branch loses some global context. That tradeoff is not academic, it shows up immediately in design. So for me this project was less I built an agent framework and more I built a concrete system that lets me test where decomposition + parallelism actually help, and where they start to hurt. PyPI:"
